<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Not Done Yet 😏</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Caveat&family=Playfair+Display&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body class="memory-body" style="display:flex; justify-content:center; align-items:center; height:100vh;">

  <div style="text-align:center;">
    <h1>Do you think I’m done? 😏</h1>

    <!-- BUTTON CONTAINER -->
    <div style="position:relative; width:300px; height:150px; margin-top:30px;">

      <!-- YES BUTTON (on top) -->
      <button id="yesBtn" style="
        position:absolute;
        left:50%;
        top:50%;
        transform:translate(-50%, -50%);
        z-index:2;
      ">
        Yes 😌
      </button>

      <!-- NO BUTTON (underneath) -->
      <button id="noBtn" onclick="goNext()" style="
        position:absolute;
        left:50%;
        top:50%;
        transform:translate(-50%, -50%);
        z-index:1;
      ">
        No 😏
      </button>

    </div>
  </div>

  <script src="play.js"></script>
  <audio id="bg-music" loop autoplay>
  <source src="assets/music.mp3" type="audio/mpeg">
</audio>
</body>

</html>
